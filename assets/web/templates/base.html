<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ title }}{% endblock %}</title>
    <link rel="stylesheet" href="/static/style.css">
    {% block extra_head %}{% endblock %}
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div class="header-icon">📡</div>
            <div>
                <h1>移动干线电路查询智能体</h1>
                <p class="header-subtitle">中国移动一干传输电路 · 系统名 → 工程期数 → 路由详情</p>
            </div>
            {% if llm_enabled %}
            <span class="llm-badge llm-on">AI 已就绪</span>
            {% else %}
            <span class="llm-badge llm-off" title="仅返回结构化数据，无AI总结">降级模式</span>
            {% endif %}
        </header>

        <main class="app-main">
            {% block content %}{% endblock %}
        </main>

        <footer class="app-footer">
            <p>基于 circuits.db · 仅限内部使用</p>
        </footer>
    </div>
</body>
</html>
